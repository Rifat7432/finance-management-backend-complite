version: "3.8"

services:
  ts-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - BUILD_MEMORY=2048
        - SEMI_SPACE_SIZE=256
    image: ts-app:latest
    deploy:
      resources:
        limits:
          memory: 1.5GB
        reservations:
          memory: 1GB
    container_name: ts-app
    restart: unless-stopped
    init: true
    env_file:
      - ./.env
    # If your app needs to expose a port, set the correct value below so the
    # service is reachable from your host (Postman / browser).
    ports:
      - "5000:5000"
    networks:
      - appnet
    # depends_on:
    #   - mongo  # Uncomment if you add a database service below

# If your app requires a database or other external service, add it below.
# Example for MongoDB (uncomment and configure if needed):
#  mongo:
#    image: mongo:latest
#    container_name: mongo
#    restart: unless-stopped
#    networks:
#      - appnet
#    volumes:
#      - mongo_data:/data/db
#    environment:
#      MONGO_INITDB_ROOT_USERNAME: root
#      MONGO_INITDB_ROOT_PASSWORD: example
#    healthcheck:
#      test: ["CMD", "mongo", "--eval", "db.runCommand('ping').ok"]
#      interval: 10s
